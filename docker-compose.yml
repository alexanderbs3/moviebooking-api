version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: movie-booking-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: movie_booking
      MYSQL_USER: movieuser
      MYSQL_PASSWORD: moviepass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 20s
      retries: 10
      interval: 10s
      start_period: 40s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-booking-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/movie_booking?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=movieuser
      - SPRING_DATASOURCE_PASSWORD=moviepass123
      - JWT_SECRET=sua_chave_muito_forte_aqui_256_bits_minimum
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
    name: movie_booking_mysql_data